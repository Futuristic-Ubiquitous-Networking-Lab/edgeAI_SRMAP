<!DOCTYPE html>
<html>
<head>

<title>SRM EV Facility</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(rgba(180,0,0,0.9), rgba(120,0,0,0.95));
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:45px;
border-radius:20px;
width:340px;
text-align:center;
color:white;
box-shadow:0 15px 40px rgba(0,0,0,0.35);
border:1px solid rgba(255,255,255,0.3);
}

.logo{
width:170px;
margin-bottom:10px;
filter:drop-shadow(0 0 6px rgba(255,255,255,0.6));
}

.icon{
font-size:40px;
margin-bottom:8px;
}

h1{
font-size:24px;
margin-bottom:5px;
}

h2{
font-size:18px;
font-weight:300;
margin-bottom:8px;
}

.subtitle{
font-size:13px;
opacity:0.9;
margin-bottom:20px;
font-style:italic;
}

input{
width:100%;
padding:14px;
font-size:18px;
border-radius:8px;
border:none;
outline:none;
box-sizing:border-box;
background:rgba(255,255,255,0.9);
}

button{
width:100%;
padding:14px;
margin-top:15px;
font-size:18px;
border:none;
border-radius:8px;
background:white;
color:#b00000;
font-weight:bold;
cursor:pointer;
}

#msg{
margin-top:15px;
font-size:18px;
color:#ffecec;
}

#counter{
margin-top:10px;
font-size:24px;
font-weight:bold;
}

</style>

<script>

function startCountdown(){

let count = 15;

document.getElementById("counter").innerHTML = count;

let timer = setInterval(function(){

count--;

document.getElementById("counter").innerHTML = count;

if(count <= 0){

clearInterval(timer);
location.reload();

}

},1000);

}

function sendCommand(value,message){

fetch("https://api.thingspeak.com/update?api_key=F7T3NXT27WBZT5R1&field1="+value);

document.getElementById("msg").innerHTML = message;

startCountdown();

}

function checkPassword(){

var password=document.getElementById("pass").value;

if(password==="parking123"){

sendCommand(500,"Request initiated from Parking Area. Please wait...");

}

else if(password==="cv123"){

sendCommand(700,"Request initiated from CV Raman Block. Please wait...");

}

else{

document.getElementById("msg").innerHTML="Wrong Password";

document.getElementById("pass").value="";

}

}

function handleKey(event){

if(event.key==="Enter"){
checkPassword();
}

}

</script>

</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<div class="icon">⚡🚗</div>

<h1>SRM University AP</h1>

<h2>EV Facility for Staff & Faculty</h2>

<div class="subtitle">
A Research Prototype Developed by EdgeAI Lab & Build Club JC 406
</div>

<input type="password"
id="pass"
placeholder="Enter Access Password"
onkeypress="handleKey(event)">

<button onclick="checkPassword()">Access</button>

<p id="msg"></p>

<div id="counter"></div>

</div>

</body>

</html>
